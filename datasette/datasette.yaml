# Datasette settings block
settings:
  default_page_size: 50
  sql_time_limit_ms: 60000
  max_returned_rows: 50000

# Permissions
permissions:
  update-row:
    id: eddie

# top-level plugin configuration
plugins:
  datasette-auth-passwords:
    # Key format: <username>_password_hash
    # Generate hash with: uv run datasette hash-password
    # Set env var: export DATASETTE_EDDIE_PASSWORD_HASH='<hash>'  (use single quotes — hash contains $)
    eddie_password_hash:
      $env: DATASETTE_EDDIE_PASSWORD_HASH
  datasette-render-images:
    size_limit: 1000000
  datasette-media:
    thumb:
      sql: "select content from thumbImages where path='./' || :key"
      database: "mediameta"
    photo:
      sql: "select full_path as filepath from exif_with_fullpath where FileName=:key"
      database: "mediameta"
  datasette-cluster-map:
    latitude_column: GPSLatitude
    longitude_column: GPSLongitude

# Database and table-level configuration
databases:
  mediameta:
    queries:
      2008 January-February:
        sql:
          SELECT thumbImages.content, exif.CreateDate, thumbImages.path as thumbFile
          FROM exif
          INNER JOIN thumbImages ON exif.SourceFile = thumbImages.path
          WHERE strftime('%Y', exif.CreateDate) = '2008'
          AND strftime('%m', exif.CreateDate) BETWEEN '01' AND '02'
          ORDER BY exif.CreateDate ASC;
      Show Time Matches all dates:
        sql: SELECT
          thumbImages.content,
          exif.CreateDate,
          exif.FileName,
          thumbImages.size
          FROM
          exif
          INNER JOIN thumbImages ON exif.SourceFile = thumbImages.path
          WHERE
          exif.CreateDate IS NOT NULL
          AND exif.CreateDate <> ''
          AND exif.CreateDate IN (
          SELECT
          CreateDate
          FROM
          exif
          WHERE
          CreateDate IS NOT NULL
          AND exif.CreateDate <> ''
          GROUP BY
          CreateDate
          HAVING
          COUNT(*) > 1
          )
          ORDER BY
          exif.CreateDate;
      Exif no date Thumbs:
        sql: SELECT e.rowid, e.SourceFile, t.content AS ThumbImage
          FROM exifNoDate e
          LEFT JOIN thumbImages t ON e.SourceFile = t.path
          ORDER BY e.rowid;
      Size of all media files:
        sql: SELECT format("%,d", SUM(FileSize)) AS TotalSize FROM Filenames;
      Number of .nef files:
        sql: SELECT COUNT(*) AS NEFCount FROM filenames WHERE LOWER(FileName) LIKE '%.nef';
